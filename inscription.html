<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/inscription.css">
  <title>Inscription - Pixel.Lab</title>
  <link rel="icon" type="image/png" href="images/cursor_icon.png">
</head>
<body>

<div class="boite">
  <h2>Inscription</h2>
  <form action="submit_form.php" method="post"> <!-- formulaire -->

    <!-- nom -->
    <div class="champ">
      <label for="username">Nom d'utilisateur :</label>
      <input type="text" id="username" name="username" placeholder="Ton pseudo" required><br>
    </div>

    <!-- email -->
    <div class="champ">
      <label for="email">Email :</label>
      <input type="email" id="email" name="email" placeholder="exemple@mail.com" required><br>
    </div>

    <!-- mot de passe -->
    <div class="champ">
      <label for="password">Mot de passe :</label>
      <input type="password" id="password" name="password" placeholder="Min. 8 caractères" required><br>
    </div>

    <button type="submit" class="btn-inscr">S'inscrire</button>
  </form>
  <br>
  <div class="bas">
    Déjà un compte ? <a href="#">Connexion</a>
  </div>
</div>

</body>
</html>
